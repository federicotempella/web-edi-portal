function timeAgo(ts) {
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60) return s+"s fa"; if(s<3600) return Math.floor(s/60)+"m fa";
  if(s<86400) return Math.floor(s/3600)+"h fa"; return Math.floor(s/86400)+"g fa";
}
function parseCSV(text) {
  const lines=text.trim().split(/\r?\n/); if(lines.length<2) return [];
  const headers=lines[0].split(",").map(h=>h.trim().replace(/^"|"$/g,""));
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const vals=line.split(",").map(v=>v.trim().replace(/^"|"$/g,""));
    const o={}; headers.forEach((h,i)=>{o[h]=vals[i]||"";}); return o;
  });
}

// ── DOWNLOAD HELPERS ──────────────────────────────────
function dlCSV(data,name) {
  if(!data?.length) return;
  const keys=Object.keys(data[0]).filter(k=>typeof data[0][k]!=="object"&&!Array.isArray(data[0][k]));
  const rows=[keys.join(","),...data.map(r=>keys.map(k=>`"${(r[k]??"").toString().replace(/"/g,'""')}"`).join(","))];
  const a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(rows.join("\n"));
  a.download=name; a.style.display="none"; document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function dlXLSX(data, name) {
  if(!data?.length) return;
  // Build simple XLSX via SheetJS if available, else fallback to CSV
  if(typeof window !== "undefined" && window.XLSX) {
    const ws = window.XLSX.utils.json_to_sheet(data.map(r=>{
      const o={};
      Object.keys(r).forEach(k=>{ if(typeof r[k]!=="object"&&!Array.isArray(r[k])) o[k]=r[k]; });
      return o;
    }));
    const wb = window.XLSX.utils.book_new();
    window.XLSX.utils.book_append_sheet(wb, ws, "Data");
    window.XLSX.writeFile(wb, name+".xlsx");
  } else {
    dlCSV(data, name); // fallback
  }
}

function contactPct(contacts) {
  if(!contacts) return 0;
  const roles=["scm1","scm2","scmManager","plantManager","emergency"];
  return Math.round((roles.filter(r=>contacts[r]?.email).length/roles.length)*100);
}

// ── LOCALSTORAGE SYNC ─────────────────────────────────
// Shared store across tabs via localStorage
function saveToLS(store) {
  try {
    const toSave={delfors:store.delfors,inventory:store.inventory,asns:store.asns,flows:store.flows,documents:store.documents,reports:store.reports};
    localStorage.setItem(LS_KEY, JSON.stringify(toSave));
    // Trigger storage event for other tabs
    localStorage.setItem(LS_KEY+"_ts", Date.now().toString());
  } catch(e) {}
}
function loadFromLS() {
  try {
    const raw=localStorage.getItem(LS_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function mkFlow(type,dir,ref,sup,supName,docNumber,itemNumber,qty,status,msgType,msgFmt){
  return {id:`F_${uid()}`,ts:Date.now(),type,dir,ref,sup,supplierName:supName,docNumber,itemNumber,qty:Number(qty)||0,status,messageType:msgType||"EDIFACT",messageFormat:msgFmt||type};
}

function storeReducer(state,action){
  let next=state;
  switch(action.type){
    case "INIT_FLOWS": next={...state,flows:action.payload}; break;
    case "MERGE_FROM_LS": next={...state,...action.payload}; break;
    case "ADD_SUPPLIER": next={...state,suppliers:[action.payload,...state.suppliers]}; break;
    case "UPDATE_SUPPLIER": next={...state,suppliers:state.suppliers.map(s=>s.id===action.payload.id?{...s,...action.payload}:s)}; break;
    case "ADD_DELFORS":{
      const flows=action.payload.map(d=>mkFlow("DELFOR","IN",d.id,d.supplierCode,d.supplierName,d.orderNumber,d.itemNumber,d.schedules?.reduce((a,s)=>a+Number(s.forecasted||0),0)||0,"Received",d.messageType,d.messageFormat));
      next={...state,delfors:[...action.payload,...state.delfors],flows:[...flows,...state.flows]};break;
    }
    case "ADD_INVENTORY":{
      const flows=action.payload.map(i=>mkFlow("INVENTORY","IN",i.id,i.supplierCode,i.supplierName,i.docNumber,i.itemNumber,Number(i.invCount)||0,"Received","EDIFACT","INVRPT"));
      next={...state,inventory:[...action.payload,...state.inventory],flows:[...flows,...state.flows]};break;
    }
    case "ADD_ASN":{
      const a=action.payload;
      const flow=mkFlow("ASN","OUT",a.id,a.supplierCode,a.supplierName,a.deliveryNoteNr||`ASN-${a.asnNumber}`,a.itemNumber,a.deliveryQuantity,a.status,"EDIFACT","DESADV");
      next={...state,asns:[a,...state.asns],flows:[flow,...state.flows]};break;
    }
    case "UPDATE_ASN":{
      const updated=state.asns.map(a=>a.id===action.payload.id?{...a,...action.payload}:a);
      // update flow status too
      const updatedFlows=state.flows.map(f=>f.ref===action.payload.id&&f.type==="ASN"?{...f,status:action.payload.status}:f);
      next={...state,asns:updated,flows:updatedFlows};break;
    }
    case "ADD_DOCUMENT": next={...state,documents:[action.payload,...state.documents]}; break;
    default: next=state;
  }
  // Persist to localStorage for cross-tab sync (skip merge action to avoid loop)
  if(action.type!=="MERGE_FROM_LS"&&action.type!=="INIT_FLOWS") saveToLS(next);
  return next;
}

// ── SHARED COMPONENTS ─────────────────────────────────
function useToast(){
  const [t,setT]=useState(null);
  const show=msg=>{setT(msg);setTimeout(()=>setT(null),2500)};
  return {t,show};
}
function ExportMenu({data,name,toast,pdfHtml=null}){
  const [o,setO]=useState(false);
  const r=useRef();
  useEffect(()=>{const fn=e=>{if(r.current&&!r.current.contains(e.target))setO(false)};document.addEventListener("mousedown",fn);return()=>document.removeEventListener("mousedown",fn);},[]);
  return(
    <div className="xwrap" ref={r}>
      <button className="btn btn-outline btn-sm" onClick={()=>setO(!o)}>Export ▾</button>
      {o&&<div className="xmenu">
        <button className="xi" onClick={()=>{dlCSV(data,name+".csv");setO(false);toast.show("CSV scaricato")}}>CSV</button>
        <button className="xi" onClick={()=>{dlXLSX(data,name);setO(false);toast.show("Excel scaricato")}}>Excel</button>
        <button className="xi" onClick={()=>{
          if(pdfHtml) { dlPrintWindow(pdfHtml,name); }
          else {
            const html=`<h2>${name}</h2><table><thead><tr>${Object.keys(data[0]||{}).filter(k=>typeof data[0][k]!=="object").map(k=>`<th>${k}</th>`).join("")}</tr></thead><tbody>${data.map(r=>`<tr>${Object.keys(r).filter(k=>typeof r[k]!=="object").map(k=>`<td>${r[k]??""}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
            dlPrintWindow(html, name);
          }
          setO(false);
        }}>PDF</button>
      </div>}
    </div>
  );
}

// ── SVG CHARTS ────────────────────────────────────────
function DonutChart({data,size=110}){
  const total=data.reduce((s,d)=>s+d.v,0);
  if(!total) return <div style={{width:size,height:size,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"var(--mut)"}}>—</div>;
  let angle=-Math.PI/2;
  const cx=size/2,cy=size/2,r=size*.38,ir=size*.23;
  const slices=data.map(d=>{
    const a=(d.v/total)*2*Math.PI;
    const [x1,y1]=[cx+r*Math.cos(angle),cy+r*Math.sin(angle)];
    const [x2,y2]=[cx+r*Math.cos(angle+a),cy+r*Math.sin(angle+a)];
    const [ix1,iy1]=[cx+ir*Math.cos(angle),cy+ir*Math.sin(angle)];
    const [ix2,iy2]=[cx+ir*Math.cos(angle+a),cy+ir*Math.sin(angle+a)];
    const lg=a>Math.PI?1:0;
    const path=`M${ix1},${iy1}L${x1},${y1}A${r},${r} 0 ${lg},1 ${x2},${y2}L${ix2},${iy2}A${ir},${ir} 0 ${lg},0 ${ix1},${iy1}Z`;
    angle+=a; return {path,color:d.color,v:d.v,label:d.label};
  });
  return(<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>{slices.map((s,i)=><path key={i} d={s.path} fill={s.color} opacity={.85}/>)}<text x={cx} y={cy} textAnchor="middle" dominantBaseline="middle" fontSize={size*.13} fontWeight="600" fill="#1a2332" fontFamily="IBM Plex Mono">{total}</text></svg>);
}
function BarChart({data,h=80,color}){
  if(!data?.length) return null;
  const max=Math.max(...data.map(d=>d.v),1),w=240,bw=Math.min(28,Math.floor((w-data.length*5)/data.length)),gap=(w-data.length*bw)/(data.length+1);
  return(<svg width={w} height={h+24} viewBox={`0 0 ${w} ${h+24}`} style={{overflow:"visible"}}>{data.map((d,i)=>{const bh=Math.max(2,(d.v/max)*(h-8)),x=gap+i*(bw+gap),y=h-bh;return <g key={i}><rect x={x} y={y} width={bw} height={bh} fill={color} rx={3} opacity={.8}/><text x={x+bw/2} y={h+14} textAnchor="middle" fontSize={9} fill="#6b7a8d" fontFamily="IBM Plex Sans">{d.label}</text>{d.v>0&&<text x={x+bw/2} y={y-3} textAnchor="middle" fontSize={9} fill="#6b7a8d" fontFamily="IBM Plex Mono">{d.v}</text>}</g>;})}</svg>);
}
function LineChart({data,h=75,color}){
  if(!data?.length||data.length<2) return null;
  const max=Math.max(...data.map(d=>d.v),1),w=240,p=8;
  const pts=data.map((d,i)=>({x:p+i*(w-p*2)/(data.length-1),y:p+(1-d.v/max)*(h-p*2),label:d.label,v:d.v}));
  const dp="M"+pts.map(pt=>`${pt.x},${pt.y}`).join("L");
  const area=dp+`L${pts[pts.length-1].x},${h}L${pts[0].x},${h}Z`;
  return(<svg width={w} height={h+18} viewBox={`0 0 ${w} ${h+18}`} style={{overflow:"visible"}}><defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity=".15"/><stop offset="100%" stopColor={color} stopOpacity=".01"/></linearGradient></defs><path d={area} fill="url(#lg)"/><path d={dp} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round" opacity={.82}/>{pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r={3} fill={color} opacity={.88}/>)}{pts.map((p,i)=><text key={i} x={p.x} y={h+14} textAnchor="middle" fontSize={9} fill="#6b7a8d" fontFamily="IBM Plex Sans">{p.label}</text>)}</svg>);
}

// ── FILTER HELPERS ────────────────────────────────────
function applyFilters(data,filters,fields){
  return data.filter(row=>{
    const q=(filters.q||"").toLowerCase();
    if(q&&!fields.some(f=>(row[f]||"").toString().toLowerCase().includes(q))) return false;
    if(filters.sup&&row.supplierCode!==filters.sup) return false;
    if(filters.item&&!(row.itemNumber||"").toLowerCase().includes((filters.item||"").toLowerCase())) return false;
    if(filters.status&&row.status!==filters.status) return false;
    if(filters.seen==="yes"&&!row.seen) return false;
    if(filters.seen==="no"&&row.seen) return false;
    if(filters.invFrom&&Number(row.invCount)<Number(filters.invFrom)) return false;
    if(filters.invTo&&Number(row.invCount)>Number(filters.invTo)) return false;
    // Per-column inline search
    const colFields=["orderNumber","date","supplierCode","supplierName","customerName","itemNumber","productDescription","docNumber","sapReference","sapDocumentNumber"];
    for(const cf of colFields){
      if(filters[cf]&&!(row[cf]||"").toString().toLowerCase().includes(filters[cf].toLowerCase())) return false;
    }
    return true;
  });
}

  return(
    <Modal title={`${flow.type} · ${flow.docNumber}`} onClose={onClose}
      footer={<><span style={{fontSize:11,color:"var(--mut)"}}>{flow.messageType} / {flow.messageFormat}</span><div style={{display:"flex",gap:8}}><button className="btn btn-outline btn-sm" onClick={onClose}>Chiudi</button><button className="btn btn-primary btn-sm" onClick={()=>{dlCSV([doc],`${flow.type}_${flow.ref}`);toast.show("Scaricato")}}>⬇ Scarica</button></div></>}>

        </table>

      {flow.type==="INVENTORY"&&<>
        <div className="detail-grid" style={{padding:"0 0 10px"}}>{[["Doc N.",doc.docNumber],["Data",doc.date],["Fornitore",doc.supplierName],["Item N.",doc.itemNumber],["Descrizione",doc.productDescription],["Inv Count",doc.invCount],["SAP Reference",doc.sapReference],["SAP Doc N.",doc.sapDocumentNumber]].map(([l,v])=><F key={l} label={l} value={v}/>)}</div>

// ── DASHBOARD + TRACKING ──────────────────────────────
function DashboardTracking({store,setPage,toast,isCustomer}){
  const [filters,setFilters]=useState({q:"",type:"",dir:"",status:"",msgType:"",msgFmt:""});
  const [preview,setPreview]=useState(null);
  const [tick,setTick]=useState(0);
  useEffect(()=>{const id=setInterval(()=>setTick(t=>t+1),30000);return()=>clearInterval(id)},[]);
  const {flows,delfors,asns,inventory,suppliers,documents}=store;
  const newDocs=documents.filter(d=>d.isNew).length;
  const donut=[{label:"DELFOR",v:flows.filter(f=>f.type==="DELFOR").length,color:"#1a6b2e"},{label:"ASN",v:flows.filter(f=>f.type==="ASN").length,color:"#1549a0"},{label:"Inventory",v:flows.filter(f=>f.type==="INVENTORY").length,color:"#a85e00"}];
  const supBar=suppliers.filter(s=>s.status==="Active").map(s=>({label:s.name.split(" ")[0],v:flows.filter(f=>f.sup===s.id).length}));
  const now=Date.now();
  const slots=[...Array.from({length:6},(_,i)=>({label:`-${6-i}h`,v:flows.filter(f=>f.ts>=(now-(7-i)*3600000)&&f.ts<(now-(6-i)*3600000)).length})),{label:"ora",v:flows.filter(f=>f.ts>=now-3600000).length}];
  const stats=isCustomer?[{l:"Fornitori attivi",v:suppliers.filter(s=>s.status==="Active").length,p:"suppliers"},{l:"DELFOR attivi",v:delfors.filter(d=>d.status==="Active").length,p:"delfor"},{l:"ASN inviati",v:asns.filter(a=>a.status==="Sent").length,p:"asn"},{l:"ASN bozza",v:asns.filter(a=>a.status==="Draft").length,p:"asn"}]:[{l:"DELFOR ricevuti",v:delfors.length,p:"delfor"},{l:"ASN inviati",v:asns.filter(a=>a.status==="Sent").length,p:"asn"},{l:"ASN bozza",v:asns.filter(a=>a.status==="Draft").length,p:"asn"},{l:"Inventory",v:inventory.length,p:"inventory"}];
  const flt=flows.filter(f=>{
    const q=(filters.q||"").toLowerCase();
    if(q&&!f.supplierName.toLowerCase().includes(q)&&!f.docNumber.toLowerCase().includes(q)&&!f.itemNumber.toLowerCase().includes(q)) return false;
    if(filters.type&&f.type!==filters.type) return false;
    if(filters.dir&&f.dir!==filters.dir) return false;
    if(filters.status&&f.status!==filters.status) return false;
    if(filters.msgType&&f.messageType!==filters.msgType) return false;
    if(filters.msgFmt&&f.messageFormat!==filters.msgFmt) return false;
    return true;
  });
  const hasF=Object.values(filters).some(v=>v);
  return(
    <div>
      {preview&&<DocPreview flow={preview} store={store} onClose={()=>setPreview(null)} toast={toast}/>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:11,marginBottom:16}}>
        {stats.map(s=><div key={s.l} className="stat-card" onClick={()=>setPage(s.p)}><div className="stat-val">{s.v}</div><div className="stat-label">{s.l}</div></div>)}
      </div>
      {newDocs>0&&<div className="notice" style={{cursor:"pointer"}} onClick={()=>setPage("documents")}>📄 <strong>{newDocs} nuovo/i documento/i</strong> disponibile/i — clicca per visualizzare</div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1.5fr 1.5fr",gap:11,marginBottom:16}}>
        <div className="card"><div className="card-hd"><span className="card-title">Tipi documento</span></div>
          <div style={{padding:"12px 10px",display:"flex",gap:14,alignItems:"center"}}>
            <DonutChart data={donut} size={100}/>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>{donut.map(d=><div key={d.label} style={{display:"flex",alignItems:"center",gap:6,fontSize:11}}><span style={{width:8,height:8,borderRadius:"50%",background:d.color,display:"inline-block"}}/><span style={{color:"var(--mut)"}}>{d.label}</span><span style={{marginLeft:"auto",fontFamily:"IBM Plex Mono",fontWeight:500}}>{d.v}</span></div>)}</div>
          </div>
        </div>
        <div className="card"><div className="card-hd"><span className="card-title">Per fornitore</span></div><div style={{padding:"10px 12px 6px"}}><BarChart data={supBar} h={75} color={BRAND.accent}/></div></div>
        <div className="card"><div className="card-hd"><span className="card-title">Flussi ultime 7h</span></div><div style={{padding:"10px 12px 6px"}}><LineChart data={slots} h={75} color={BRAND.color}/></div></div>
      </div>
      <div className="card">
        <div className="card-hd"><div style={{display:"flex",alignItems:"center",gap:8}}><span className="card-title">Flow Tracking</span><span className="live-dot"/><span style={{fontSize:10.5,color:"#1a6b2e"}}>Live</span></div><span style={{fontSize:11,color:"var(--mut)"}}>{flt.length} flussi</span></div>
        <div className="fb">
          <input placeholder="Fornitore, documento, articolo…" value={filters.q} onChange={e=>setFilters({...filters,q:e.target.value})} style={{width:190}}/>
          <select value={filters.type} onChange={e=>setFilters({...filters,type:e.target.value})} style={{padding:"5px 9px",border:"1px solid var(--bor)",borderRadius:8,fontSize:12,fontFamily:"inherit"}}><option value="">Tutti i tipi</option><option value="DELFOR">DELFOR</option><option value="ASN">ASN</option><option value="INVENTORY">Inventory</option></select>
          <select value={filters.dir} onChange={e=>setFilters({...filters,dir:e.target.value})} style={{padding:"5px 9px",border:"1px solid var(--bor)",borderRadius:8,fontSize:12,fontFamily:"inherit"}}><option value="">Dir.</option><option value="IN">IN</option><option value="OUT">OUT</option></select>
          <select value={filters.status} onChange={e=>setFilters({...filters,status:e.target.value})} style={{padding:"5px 9px",border:"1px solid var(--bor)",borderRadius:8,fontSize:12,fontFamily:"inherit"}}><option value="">Stato</option><option value="Sent">Sent</option><option value="Received">Received</option><option value="Draft">Draft</option><option value="Closed">Closed</option></select>
          <select value={filters.msgType} onChange={e=>setFilters({...filters,msgType:e.target.value})} style={{padding:"5px 9px",border:"1px solid var(--bor)",borderRadius:8,fontSize:12,fontFamily:"inherit"}}><option value="">Standard</option><option value="EDIFACT">EDIFACT</option><option value="VDA">VDA</option><option value="Odette">Odette</option></select>
          <select value={filters.msgFmt} onChange={e=>setFilters({...filters,msgFmt:e.target.value})} style={{padding:"5px 9px",border:"1px solid var(--bor)",borderRadius:8,fontSize:12,fontFamily:"inherit"}}><option value="">Formato</option><option value="DELFOR">DELFOR</option><option value="DESADV">DESADV</option><option value="INVRPT">INVRPT</option><option value="INVOIC">INVOIC</option></select>
          {hasF&&<button className="btn btn-ghost btn-sm" onClick={()=>setFilters({q:"",type:"",dir:"",status:"",msgType:"",msgFmt:""})}>× Clear</button>}
        </div>
        <div style={{display:"flex",padding:"6px 12px",borderBottom:"1px solid var(--bor)",background:"#fafbfc",gap:8,fontSize:"10px",fontWeight:500,color:"var(--mut)",textTransform:"uppercase",letterSpacing:".4px"}}>
          <div style={{width:12}}/><div style={{width:32}}>Dir</div><div style={{width:75}}>Tipo</div><div style={{width:88}}>Standard</div><div style={{width:78}}>Formato</div><div style={{flex:1}}>Fornitore</div><div style={{width:118}}>Documento</div><div style={{width:100}}>Articolo</div><div style={{width:52,textAlign:"right"}}>Qtà</div><div style={{width:65}}>Stato</div><div style={{width:58,textAlign:"right"}}>Quando</div>
        </div>
        <div style={{maxHeight:340,overflowY:"auto"}}>
          {flt.length===0&&<div className="empty">Nessun flusso trovato</div>}
          {flt.slice(0,60).map(f=>(
            <div key={f.id} className="fr" onClick={()=>f.ref&&setPreview(f)} title={f.ref?"Clicca per preview":""}>
              <div style={{width:12}}><span className={`fdot fdot-${f.dir.toLowerCase()}`}/></div>
              <div style={{width:32}}><span className={`badge b-${f.dir.toLowerCase()}`} style={{fontSize:10,padding:"1px 5px"}}>{f.dir}</span></div>
              <div style={{width:75}}><span className={`badge b-${f.type.toLowerCase()}`} style={{fontSize:10,padding:"1px 5px"}}>{f.type}</span></div>
              <div style={{width:88,fontSize:11,fontFamily:"IBM Plex Mono",color:"var(--mut)"}}>{f.messageType}</div>
              <div style={{width:78,fontSize:11,color:"var(--mut)"}}>{f.messageFormat}</div>
              <div style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.supplierName}</div>
              <div style={{width:118,fontFamily:"IBM Plex Mono",fontSize:11,color:"#1e3a5f",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.docNumber}</div>
              <div style={{width:100,fontFamily:"IBM Plex Mono",fontSize:11,color:"var(--mut)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.itemNumber}</div>
              <div style={{width:52,textAlign:"right",fontSize:11.5,fontWeight:500}}>{f.qty>0?f.qty.toLocaleString():"—"}</div>
              <div style={{width:65}}><span className={`badge b-${f.status.toLowerCase()}`} style={{fontSize:10,padding:"1px 5px"}}>{f.status}</span></div>
              <div style={{width:58,textAlign:"right",fontSize:11,color:"var(--mut)"}}>{timeAgo(f.ts)}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── DELFOR SECTION ────────────────────────────────────
function DelforSection({store,dispatch,toast,isCustomer,onCreateASN}){
  const [sel,setSel]=useState(null);
  const [exp,setExp]=useState(null);
  const [selected,setSelected]=useState([]);
  const [filters,setFilters]=useState({q:"",sup:"",item:"",dateFrom:"",dateTo:"",seen:"",status:""});
  const fr=useRef();
  const handleFile=file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const rows=parseCSV(e.target.result);
      if(!rows.length){toast.show("File vuoto o formato non valido");return;}
      const items=rows.map(r=>{
        const sc=r["Supplier Code"]||r["supplierCode"]||"S001";
        const sup=store.suppliers.find(s=>s.code===sc||s.id===sc);
        return{id:`DEL_${uid()}`,supplierCode:sc,supplierName:sup?.name||r["Supplier Name"]||sc,orderNumber:r["Order Number"]||`ORD-${uid()}`,date:r["Date"]||nowDate(),transmissionDate:nowStr(),itemNumber:r["Item Number"]||"",productDescription:r["Product Description"]||"",customerName:r["Customer Name"]||BRAND.name,status:r["Status"]||"Active",validity:r["Validity"]||"",uom:r["UoM"]||"EA",planner:r["Planner"]||"",diNumber:r["DI Number"]||"",diNumberOld:"",documentNo:r["Document No"]||"",materialSupplier:"",messageNumber:"",supplyModel:r["Supply Model"]||"",orderPosition:r["Order Position"]||"",deliveryNoteNumber:"",currentCumulatedQtyReceived:0,seen:false,sapReference:r["SAP Reference"]||"",sapDocumentNumber:r["SAP Doc Number"]||"",messageType:r["Message Type"]||"EDIFACT",messageFormat:"DELFOR",schedules:[]};
      });
      dispatch({type:"ADD_DELFORS",payload:items});
      toast.show(`${items.length} DELFOR caricati — visibili nel Supplier Portal e nel Tracking`);
    };
    reader.readAsText(file);
  };
  const flt=applyFilters(store.delfors,filters,["orderNumber","itemNumber","productDescription","supplierName","supplierCode","documentNo","sapReference"]);
  const toggleSel=id=>setSelected(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const toggleAll=()=>setSelected(selected.length===flt.length?[]:flt.map(r=>r.id));

  if(sel) return(
    <div>
      <button className="back-btn" onClick={()=>setSel(null)}>← Lista DELFOR</button>
      <div className="card">
        <div className="card-hd">
          <div><div className="card-title">DELFOR — {sel.orderNumber}</div><div style={{fontSize:11,color:"var(--mut)",marginTop:1}}>{sel.transmissionDate} · {sel.messageType}/{sel.messageFormat}</div></div>

  const [tab,setTab]=useState(prefillDelfor?"create":"gen");

  const [src,setSrc]=useState(null);

  const [savedAsn,setSavedAsn]=useState(null); // the saved (draft) asn

  const [filterDateTo,setFilterDateTo]=useState("");
  const [filterItem,setFilterItem]=useState("");
  const [filterStatus,setFilterStatus]=useState("");
  // column search for positions tab
  const [posSearch,setPosSearch]=useState({date:"",supCode:"",supName:"",custName:"",itemNum:"",itemDesc:""});

  useEffect(()=>{
    if(prefillDelfor){ openCreate(prefillDelfor,null); setTab("create"); }

    const sup=store.suppliers.find(s=>s.id===del.supplierCode||s.code===del.supplierCode);
    setSrc(del); setSrcSch(sch); setSaved(false); setSavedAsn(null);

      itemNumber:del.itemNumber, productDescription:del.productDescription,

      shipFromLocation:"", shipFromStreet:sup?.address||"", shipFromCity:sup?.city||"",
      shipFromZip:sup?.zip||"", shipFromCountryDiv:"", shipFromCountry:sup?.country||"",
      shipToLocation:del.customerName||BRAND.name, shipToStreet:"S.S. 206, km 28",
      shipToCity:"Fauglia", shipToCountry:"IT",
      pickupDate:"", deliveryNoteNr:"", deliveryDate:sch?.date||"",
      deliveryQuantity:sch?.forecasted||"",
      nPallets:0, qtyPerPallet:0, grossWeight:0, netWeight:0, tare:0, label:"",

    else { dispatch({type:"ADD_ASN",payload:asn}); }
    setSaved(true); setSavedAsn(asn);
    toast.show("ASN salvato in bozza ✓");

  const doSend=()=>{
    if(!saved&&!savedAsn){toast.show("⚠️ Salva l'ASN prima di inviarlo");return;}

  const positionsSource=isCustomer?store.delfors:store.delfors.filter(d=>d.status==="Active");

    if(posSearch.supName&&!(d.supplierName||"").toLowerCase().includes(posSearch.supName.toLowerCase())) return false;
    if(posSearch.custName&&!(d.customerName||"").toLowerCase().includes(posSearch.custName.toLowerCase())) return false;
    if(posSearch.itemNum&&!(d.itemNumber||"").toLowerCase().includes(posSearch.itemNum.toLowerCase())) return false;

        <div className="sec-div">Part details</div>
        <div className="detail-grid">
          {[["Part number",sel.itemNumber],["Item description",sel.productDescription],["Scheduling agreement",sel.schedulingAgreement],["SA Position",sel.schedulingAgreementPosition],["Pick up date",sel.pickupDate],["Delivery note nr.",sel.deliveryNoteNr],["Delivery date",sel.deliveryDate],["Delivery quantity",sel.deliveryQuantity?.toLocaleString()]].map(([l,v])=><F key={l} label={l} value={v}/>)}

            <div><div className="dl">Ship to location</div><input className="form-input" disabled value={fd.shipToLocation||""}/></div>
            <div><div className="dl">Ship to street</div><input className="form-input" disabled value={fd.shipToStreet||""}/></div>

            <div><div className="dl">Ship to country</div><input className="form-input" disabled value={fd.shipToCountry||""}/></div>

          {/* Optional shipping */}
          <div style={{fontSize:"10.5px",fontWeight:600,color:"var(--mut)",textTransform:"uppercase",letterSpacing:".4px",marginBottom:8}}>Optional info for shipping document</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:"10px 14px",marginBottom:16}}>
            {[["nPallets","N. of Pallets"],["qtyPerPallet","Qty per Pallet"],["grossWeight","Gross weight (kg)"],["netWeight","Net weight (kg)"],["tare","Tare (kg)"],["label","Label"]].map(([k,l])=>(

          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"10px 14px",marginBottom:8}}>

  // Main list view

        <div className="card-hd"><span className="card-title">Anagrafica cliente</span></div>
        <div className="detail-grid">
          {[["Nome",customer.name],["P.IVA",customer.vatNumber],["Indirizzo",customer.address],["Città",customer.city],["Paese",customer.country],["Telefono",customer.phone],["Email",customer.email],["Website",customer.website]].map(([l,v])=><F key={l} label={l} value={v}/>)}
        </div>
      </div>
      <div className="card">
        <div className="card-hd"><span className="card-title">Contatti di riferimento</span></div>
        {roles.map(r=>{
          const c=customer.contacts[r.k];
          if(!c?.firstName&&!c?.email) return null;
          return(
            <div key={r.k} style={{padding:"11px 14px",borderBottom:"1px solid var(--bor)"}}>
              <div style={{fontSize:"10px",fontWeight:600,color:r.c,textTransform:"uppercase",letterSpacing:".4px",marginBottom:7}}>{r.l}</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px 14px"}}>
                {[["Nome",c.firstName],["Cognome",c.lastName],["Email",c.email],["Telefono",c.phone]].map(([l,v])=><F key={l} label={l} value={v}/>)}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── DOCUMENTS SECTION ─────────────────────────────────
function DocumentsSection({store,dispatch,toast,isCustomer}){
  const [addOpen,setAddOpen]=useState(false);
  const [newDoc,setNewDoc]=useState({title:"",description:"",fileType:"pdf",visibility:"all"});
  const fr=useRef();
  const docs=isCustomer?store.documents:store.documents.filter(d=>d.visibility==="all"||d.uploadedByRole==="supplier");
  const fileIcon=t=>t==="pdf"?"📄":t==="xlsx"?"📊":"📋";
  const fileClass=t=>t==="pdf"?"doc-icon-pdf":t==="xlsx"?"doc-icon-xlsx":"doc-icon-csv";
  const handleUpload=file=>{
    const doc={id:`DOC_${uid()}`,title:file.name.replace(/\.[^/.]+$/,""),description:"",fileType:file.name.split(".").pop().toLowerCase()||"pdf",date:nowDate(),uploadedBy:isCustomer?"admin@acme.com":"supplier@portal.com",uploadedByRole:isCustomer?"customer":"supplier",visibility:"all",visibleToCompanies:[],visibleToUsers:[],isNew:true};
    dispatch({type:"ADD_DOCUMENT",payload:doc});
    toast.show(`"${doc.title}" caricato`);
  };
  return(
    <div>
      <div className="page-hd">
        <div><div className="page-title">Documenti</div><div className="page-sub">{isCustomer?"Documenti condivisi con i fornitori":"Documenti ricevuti e caricati"}</div></div>
        <button className="btn btn-primary btn-sm" onClick={()=>setAddOpen(true)}>+ Aggiungi documento</button>
      </div>
      {addOpen&&(
        <div className="card" style={{marginBottom:14}}>
          <div className="card-hd"><span className="card-title">Nuovo documento</span><button className="btn btn-ghost btn-sm" onClick={()=>setAddOpen(false)}>× Chiudi</button></div>
          <div style={{padding:14}}>
            <div className="upload-zone" onClick={()=>fr.current.click()}
              onDragOver={e=>{e.preventDefault();e.currentTarget.classList.add("dg")}}
              onDragLeave={e=>e.currentTarget.classList.remove("dg")}
              onDrop={e=>{e.preventDefault();e.currentTarget.classList.remove("dg");handleUpload(e.dataTransfer.files[0])}}>
              <div style={{fontSize:24,marginBottom:6}}>📂</div>
              <div style={{fontSize:13,fontWeight:500,color:BRAND.accent}}>Upload documento</div>
              <div style={{fontSize:11,color:"var(--mut)",marginTop:3}}>PDF, Excel, CSV — clicca o trascina qui</div>
            </div>
            <input ref={fr} type="file" style={{display:"none"}} onChange={e=>handleUpload(e.target.files[0])}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px 14px",marginTop:12}}>
              <div><label className="form-label">Titolo</label><input className="form-input" value={newDoc.title} onChange={e=>setNewDoc({...newDoc,title:e.target.value})}/></div>
              <div><label className="form-label">Tipo file</label>
                <select className="form-input form-select" value={newDoc.fileType} onChange={e=>setNewDoc({...newDoc,fileType:e.target.value})}>
                  <option value="pdf">PDF</option><option value="xlsx">Excel</option><option value="csv">CSV</option>
                </select>
              </div>
              <div style={{gridColumn:"1/-1"}}><label className="form-label">Descrizione</label><input className="form-input" value={newDoc.description} onChange={e=>setNewDoc({...newDoc,description:e.target.value})}/></div>
              {isCustomer&&(
                <div><label className="form-label">Visibilità</label>
                  <select className="form-input form-select" value={newDoc.visibility} onChange={e=>setNewDoc({...newDoc,visibility:e.target.value})}>
                    <option value="all">Tutti i fornitori</option>
                    <option value="company">Azienda specifica</option>
                    <option value="user">Utente specifico</option>
                  </select>
                </div>
              )}
            </div>
            <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:12}}>
              <button className="btn btn-outline btn-sm" onClick={()=>setAddOpen(false)}>Annulla</button>
              <button className="btn btn-primary btn-sm" onClick={()=>{
                if(!newDoc.title){toast.show("Inserisci un titolo");return;}
                const doc={...newDoc,id:`DOC_${uid()}`,date:nowDate(),uploadedBy:isCustomer?"admin@acme.com":"supplier@portal.com",uploadedByRole:isCustomer?"customer":"supplier",visibleToCompanies:[],visibleToUsers:[],isNew:true};
                dispatch({type:"ADD_DOCUMENT",payload:doc});setAddOpen(false);toast.show(`"${doc.title}" aggiunto`);
              }}>Salva</button>
            </div>
          </div>
        </div>
      )}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {docs.length===0&&<div className="card"><div className="empty">Nessun documento disponibile</div></div>}
        {docs.map(d=>(
          <div key={d.id} className="doc-card">
            <div className={`doc-icon ${fileClass(d.fileType)}`}>{fileIcon(d.fileType)}</div>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
                <div>
                  <div style={{fontSize:13.5,fontWeight:500,marginBottom:2}}>
                    {d.title}{d.isNew&&<span className="badge b-new" style={{marginLeft:7,fontSize:10}}>Nuovo</span>}
                  </div>
                  <div style={{fontSize:12,color:"var(--mut)"}}>{d.description}</div>
                </div>
                <button className="btn btn-outline btn-sm" onClick={()=>toast.show(`"${d.title}" — download attivo nel sistema live`)}>⬇ Download</button>
              </div>
              <div style={{fontSize:11,color:"var(--sub)",marginTop:6,display:"flex",gap:12}}>
                <span>{d.date}</span>
                <span>Da: {d.uploadedBy}</span>
                <span>{d.uploadedByRole==="customer"?"Cliente":"Fornitore"}</span>
                {isCustomer&&<span>Visibilità: {d.visibility==="all"?"Tutti":d.visibility==="company"?"Azienda":"Utente"}</span>}
                <span style={{fontFamily:"IBM Plex Mono",fontSize:10.5}}>{d.fileType.toUpperCase()}</span>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── REPORTS SECTION ───────────────────────────────────
function ReportsSection({store,toast}){
  const [filters,setFilters]=useState({q:"",dir:"",status:"",msgType:"",msgFmt:""});
  const flt=store.reports.filter(r=>{
    const q=(filters.q||"").toLowerCase();
    if(q&&!r.edifactNumber.toLowerCase().includes(q)&&!r.supplierName.toLowerCase().includes(q)) return false;
    if(filters.dir&&r.direction!==filters.dir) return false;
    if(filters.status==="ok"&&!r.completed) return false;
    if(filters.status==="failed"&&r.completed) return false;
    if(filters.msgType&&r.messageType!==filters.msgType) return false;
    if(filters.msgFmt&&r.messageFormat!==filters.msgFmt) return false;
    return true;
  });
  const hasF=Object.values(filters).some(v=>v);
  return(
    <div>
      <div className="page-hd">
        <div><div className="page-title">Reports</div><div className="page-sub">Log trasmissioni EDI</div></div>
        <ExportMenu data={flt} name="reports" toast={toast}/>
      </div>
      <div className="card">
        <div className="fb">
          <input placeholder="Edifact N., fornitore…" value={filters.q} onChange={e=>setFilters({...filters,q:e.target.value})} style={{width:200}}/>
          <select value={filters.dir} onChange={e=>setFilters({...filters,dir:e.target.value})} style={{padding:"5px 9px",border:"1px solid var(--bor)",borderRadius:8,fontSize:12,fontFamily:"inherit"}}><option value="">Direzione</option><option value="IN">IN</option><option value="OUT">OUT</option></select>
          <select value={filters.status} onChange={e=>setFilters({...filters,status:e.target.value})} style={{padding:"5px 9px",border:"1px solid var(--bor)",borderRadius:8,fontSize:12,fontFamily:"inherit"}}><option value="">Stato</option><option value="ok">Completed</option><option value="failed">Failed</option></select>
          <select value={filters.msgType} onChange={e=>setFilters({...filters,msgType:e.target.value})} style={{padding:"5px 9px",border:"1px solid var(--bor)",borderRadius:8,fontSize:12,fontFamily:"inherit"}}><option value="">Standard</option><option value="EDIFACT">EDIFACT</option><option value="VDA">VDA</option><option value="Odette">Odette</option></select>
          <select value={filters.msgFmt} onChange={e=>setFilters({...filters,msgFmt:e.target.value})} style={{padding:"5px 9px",border:"1px solid var(--bor)",borderRadius:8,fontSize:12,fontFamily:"inherit"}}><option value="">Formato</option><option value="DELFOR">DELFOR</option><option value="DESADV">DESADV</option><option value="INVRPT">INVRPT</option><option value="INVOIC">INVOIC</option></select>
          {hasF&&<button className="btn btn-ghost btn-sm" onClick={()=>setFilters({q:"",dir:"",status:"",msgType:"",msgFmt:""})}>× Clear</button>}
          <span style={{marginLeft:"auto",fontSize:11,color:"var(--mut)"}}>{flt.length} record</span>
        </div>
        <table>
          <thead><tr><th>Edifact Number</th><th>Tx Date</th><th>Direction</th><th>Standard</th><th>Formato</th><th>Fornitore</th><th>Stato</th><th>Failed Reason</th><th>Created at</th></tr></thead>
          <tbody>{flt.map(r=>(
            <tr key={r.id}>
              <td className="mono">{r.edifactNumber}</td>
              <td>{r.transmissionDate}</td>
              <td><span className={`badge b-${r.direction.toLowerCase()}`}>{r.direction}</span></td>
              <td><span style={{fontFamily:"IBM Plex Mono",fontSize:11,color:"var(--mut)"}}>{r.messageType}</span></td>
              <td><span style={{fontSize:11,color:"var(--mut)"}}>{r.messageFormat}</span></td>
              <td>{r.supplierName}</td>
              <td>{r.completed?<span className="badge b-completed">✅ Completed</span>:<span className="badge b-failed">❌ Failed</span>}</td>
              <td style={{fontSize:11,color:"#b71c1c"}}>{r.failedReason||"—"}</td>
              <td style={{fontSize:11}}>{r.createdAt}</td>
            </tr>
          ))}
          {flt.length===0&&<tr><td colSpan={9} style={{textAlign:"center",color:"var(--mut)",padding:16}}>Nessun report</td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── COMPANY DATA (Supplier) ───────────────────────────
function CompanyDataPage({toast}){
  const [d,setD]=useState({name:"",supplierId:"",vatNumber:"",duns:"",plantId:"",address:"",city:"",zip:"",country:"IT"});
  const [contacts,setContacts]=useState({scm1:{firstName:"",lastName:"",email:"",phone:""},scm2:{firstName:"",lastName:"",email:"",phone:""},scmManager:{firstName:"",lastName:"",email:"",phone:""},plantManager:{firstName:"",lastName:"",email:"",phone:""},emergency:{firstName:"",lastName:"",email:"",phone:""}});
  const roles=[{k:"scm1",l:"SCM Person 1",c:"#0f4c81"},{k:"scm2",l:"SCM Person 2",c:"#1549a0"},{k:"scmManager",l:"SCM Manager",c:"#5b35b0"},{k:"plantManager",l:"Plant Manager",c:"#a85e00"},{k:"emergency",l:"Emergency 24/7",c:"#b71c1c"}];
  const pct=contactPct(contacts);
  return(
    <div>
      <div className="page-hd">
        <div><div className="page-title">Company Data</div><div className="page-sub">Dati aziendali e contatti</div></div>
        <PctRing pct={pct}/>
      </div>
      <div className="card" style={{marginBottom:13}}>
        <div className="card-hd"><span className="card-title">Dati anagrafici</span></div>
        <div className="detail-grid">{[["name","Nome"],["supplierId","Supplier ID"],["vatNumber","P.IVA"],["duns","DUNS"],["plantId","Plant ID"],["address","Indirizzo"],["city","Città"],["zip","CAP"],["country","Paese"]].map(([k,l])=>(
          <div key={k}><label className="form-label">{l}</label><input className="form-input" value={d[k]||""} onChange={e=>setD({...d,[k]:e.target.value})}/></div>
        ))}</div>
        <div style={{padding:"0 13px 12px",display:"flex",justifyContent:"flex-end"}}><button className="btn btn-primary btn-sm" onClick={()=>toast.show("Dati aggiornati")}>Salva</button></div>
      </div>
      <div className="card">
        <div className="card-hd"><span className="card-title">Contatti</span></div>
        {roles.map(r=>{
          const c=contacts[r.k];
          return(
            <div key={r.k} style={{padding:"10px 13px",borderBottom:"1px solid var(--bor)"}}>
              <div style={{fontSize:"10px",fontWeight:600,color:r.c,textTransform:"uppercase",letterSpacing:".4px",marginBottom:7}}>{r.l}</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"7px 12px"}}>
                {[["firstName","Nome"],["lastName","Cognome"],["email","Email"],["phone",r.k==="emergency"?"Mobile":"Tel"]].map(([f,l])=>(
                  <div key={f}><label className="form-label">{l}</label><input className="form-input" value={c[f]||""} onChange={e=>setContacts({...contacts,[r.k]:{...c,[f]:e.target.value}})}/></div>
                ))}
              </div>
              <div style={{display:"flex",justifyContent:"flex-end",marginTop:6}}><button className="btn btn-primary btn-sm" onClick={()=>toast.show(`${r.l} salvato`)}>Salva</button></div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── APP ROOT ──────────────────────────────────────────
function App(){
  const [store,dispatch]=useReducer(storeReducer,INIT);
  const [session,setSession]=useState(null);
  const [page,setPage]=useState("dashboard");
  const [prefillDelfor,setPrefillDelfor]=useState(null);
  const [showProfile,setShowProfile]=useState(false);
  const [xlsxLoaded,setXlsxLoaded]=useState(false);
  const toast=useToast();

  // Load SheetJS for real Excel downloads
  useEffect(()=>{
    if(window.XLSX){setXlsxLoaded(true);return;}
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
    s.onload=()=>setXlsxLoaded(true);
    document.head.appendChild(s);
  },[]);

  // Init flows once
  useEffect(()=>{if(store.flows.length===0)dispatch({type:"INIT_FLOWS",payload:buildInitFlows()});},[]);

  // localStorage cross-tab sync: poll every 2 seconds for changes from other tab
  useEffect(()=>{
    const poll=setInterval(()=>{
      try {
        const ts=localStorage.getItem(LS_KEY+"_ts");
        const lastTs=sessionStorage.getItem("last_ls_ts");
        if(ts&&ts!==lastTs){
          sessionStorage.setItem("last_ls_ts",ts);
          const data=loadFromLS();
          if(data) dispatch({type:"MERGE_FROM_LS",payload:data});
        }
      } catch(e){}
    },2000);
    return()=>clearInterval(poll);
  },[]);

  if(!session) return(
    <>
      <style>{css}</style>
      <Login onLogin={p=>{setSession(p);setPage("dashboard");}}/>
      {toast.t&&<div className="toast">{toast.t}</div>}
    </>
  );

  const isC=session==="customer";
  const handleCreateASN=delfor=>{setPrefillDelfor(delfor);setPage("asn");};
  const newDocs=store.documents.filter(d=>d.isNew).length;
  const draftASN=store.asns.filter(a=>a.status==="Draft").length;
  const actDel=store.delfors.filter(d=>d.status==="Active").length;

  const cNav=[
    {sec:"Overview"},{key:"dashboard",icon:"⊞",label:"Dashboard & Tracking"},
    {sec:"Documenti"},{key:"delfor",icon:"📋",label:"DELFOR"},{key:"asn",icon:"🚚",label:"ASN (DDT)",badge:draftASN},{key:"inventory",icon:"📦",label:"Inventory Report"},
    {sec:"Gestione"},{key:"suppliers",icon:"🏗️",label:"Fornitori"},{key:"users",icon:"👥",label:"Utenti"},
    {sec:"Sistema"},{key:"documents",icon:"📁",label:"Documenti",badge:newDocs},{key:"reports",icon:"📊",label:"Reports"},
  ];
  const sNav=[
    {sec:"Overview"},{key:"dashboard",icon:"⊞",label:"Dashboard & Tracking"},
    {sec:"Documenti"},{key:"delfor",icon:"📋",label:"DELFOR",badge:actDel},{key:"asn",icon:"🚚",label:"ASN (DDT)",badge:draftASN},{key:"inventory",icon:"📦",label:"Inventory Report"},
    {sec:"Sistema"},{key:"documents",icon:"📁",label:"Documenti",badge:newDocs},
    {sec:"Gestione"},{key:"supusers",icon:"👥",label:"Users"},{key:"customer",icon:"🏭",label:"Customer"},
    {sec:"Profilo"},{key:"company",icon:"⊙",label:"Company Data"},
  ];

  const titles={dashboard:"Dashboard & Flow Tracking",delfor:"DELFOR",asn:"ASN (DDT)",inventory:"Inventory Report",suppliers:"Fornitori",users:"Utenti",supusers:"Users",customer:"Customer",documents:"Documenti",reports:"Reports",company:"Company Data"};
  const userName=isC?"Admin User":"Supplier User";

  const renderPage=()=>{
    if(showProfile) return <ProfilePage userName={userName} onBack={()=>setShowProfile(false)} toast={toast}/>;
    if(page==="dashboard") return <DashboardTracking store={store} setPage={setPage} toast={toast} isCustomer={isC}/>;
    if(page==="delfor") return <DelforSection store={store} dispatch={dispatch} toast={toast} isCustomer={isC} onCreateASN={isC?null:handleCreateASN}/>;
    if(page==="inventory") return <InventorySection store={store} dispatch={dispatch} toast={toast} isCustomer={isC}/>;
    if(page==="asn") return <ASNSection store={store} dispatch={dispatch} toast={toast} isCustomer={isC} prefillDelfor={prefillDelfor} clearPrefill={()=>setPrefillDelfor(null)}/>;
    if(page==="suppliers"&&isC) return <SuppliersSection store={store} dispatch={dispatch} toast={toast}/>;
    if(page==="users"&&isC) return <UsersSection store={store} toast={toast}/>;
    if(page==="supusers"&&!isC) return <SupplierUsersSection store={store} toast={toast}/>;
    if(page==="customer"&&!isC) return <CustomerSection store={store} toast={toast}/>;
    if(page==="documents") return <DocumentsSection store={store} dispatch={dispatch} toast={toast} isCustomer={isC}/>;
    if(page==="reports") return <ReportsSection store={store} toast={toast}/>;
    if(page==="company"&&!isC) return <CompanyDataPage toast={toast}/>;
    return <div className="empty">Sezione non disponibile</div>;
  };

  return(
    <>
      <style>{css}</style>
      <div className="app">
        <Sidebar
          items={isC?cNav:sNav}
          active={showProfile?"":page}
          setActive={p=>{setPage(p);setShowProfile(false);if(p!=="asn")setPrefillDelfor(null);}}
          portal={session}
          userName={userName}
          onLogout={()=>setSession(null)}
        />
        <div className="main">
          <div className="topbar">
            <div>
              <div style={{fontSize:14,fontWeight:500}}>{showProfile?"Profilo":(titles[page]||page)}</div>
              <div style={{fontSize:11,color:"var(--mut)",marginTop:1}}>
                {BRAND.name} · {isC?"Customer Portal":"Supplier Portal"}
                {!isC&&<span style={{marginLeft:8,fontSize:10,color:"#1a6b2e",background:"#e6f4ea",padding:"2px 7px",borderRadius:10}}>⇄ Sincronizzato</span>}
              </div>
            </div>
            <UserDropdown userName={userName} onLogout={()=>setSession(null)} onProfile={()=>setShowProfile(true)}/>
          </div>
          <div className="content">{renderPage()}</div>
        </div>
      </div>
      {toast.t&&<div className="toast">{toast.t}</div>}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
